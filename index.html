<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brain Training</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas { display: block; }

/* ── Hamburger menu ─────────────────────────────────────── */
#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(30,30,30,0.82); border: none; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px; touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }

#menuPanel {
    position: absolute; bottom: 54px; right: 0; z-index: 998;
    background: rgba(25,25,25,0.96); border-radius: 10px;
    overflow-y: auto; max-height: 80vh;
    display: none; flex-direction: column; min-width: 200px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#menuPanel::-webkit-scrollbar { width: 6px; }
#menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
#menuPanel.open { display: flex; }

#menuDateStamp {
    padding: 6px 12px 2px 12px; font: 10px Arial, sans-serif;
    color: rgba(255,255,255,0.35); text-align: right;
    flex-shrink: 0; user-select: none; letter-spacing: 0.3px;
}

.menu-item {
    padding: 13px 18px; color: #fff; font: 15px Arial, sans-serif;
    cursor: pointer; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }
</style>
</head>
<body>

<div id="rotateWrap">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="menuWrap">
    <div id="menuPanel">
        <div id="menuDateStamp"></div>
        <div class="menu-item" id="miPlay">Play</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miConfig">Config / Manage</div>
        <div class="menu-item" id="miHelp">Help</div>
    </div>
    <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<script>
// ── Date stamp ─────────────────────────────────────────────────────
(function(){
    const d = new Date();
    document.getElementById("menuDateStamp").textContent =
        d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"})
        + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
})();

// ── Layout globals ─────────────────────────────────────────────────
const GRID_LINES = 6; // lines in each direction → 7 columns/rows of cells

let GW, GH, isPortrait, bgColor;
const canvas  = document.getElementById("gameCanvas");
const ctx     = canvas.getContext("2d");
const wrap    = document.getElementById("rotateWrap");
const menuWrap  = document.getElementById("menuWrap");
const menuBtn   = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");

// ── Menu helpers ───────────────────────────────────────────────────
function closeMenu() {
    menuPanel.classList.remove("open");
    menuBtn.classList.remove("open");
}

function updateMenuPosition() {
    const PAD = 14;
    if (isPortrait) {
        menuWrap.classList.add("portrait-mode");
        menuWrap.style.bottom = PAD + "px";
        menuWrap.style.left   = PAD + "px";
        menuWrap.style.right  = "auto";
    } else {
        menuWrap.classList.remove("portrait-mode");
        menuWrap.style.bottom = PAD + "px";
        menuWrap.style.right  = PAD + "px";
        menuWrap.style.left   = "auto";
    }
}

// ── Menu item handlers ─────────────────────────────────────────────
document.getElementById("miPlay").addEventListener("pointerup", e => {
    e.stopPropagation();
    closeMenu();
    alert("Play — TBD");
});

document.getElementById("miConfig").addEventListener("pointerup", e => {
    e.stopPropagation();
    closeMenu();
    alert("Config / Manage — TBD");
});

document.getElementById("miHelp").addEventListener("pointerup", e => {
    e.stopPropagation();
    closeMenu();
    alert("Help — coming soon");
});

menuBtn.addEventListener("pointerup", e => {
    e.stopPropagation();
    const isOpen = menuPanel.classList.toggle("open");
    menuBtn.classList.toggle("open", isOpen);
});

menuPanel.addEventListener("pointerup", e => e.stopPropagation());

document.addEventListener("pointerup", () => {
    if (menuPanel.classList.contains("open")) closeMenu();
});

// ── Canvas / grid rendering ────────────────────────────────────────
function renderGrid() {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, GW, GH);
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    for (let i = 1; i <= GRID_LINES; i++) {
        const x = GW * i / (GRID_LINES + 1);
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke();
    }
    for (let i = 1; i <= GRID_LINES; i++) {
        const y = GH * i / (GRID_LINES + 1);
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke();
    }
}

// ── Layout setup ───────────────────────────────────────────────────
function setupLayout() {
    const pw = window.innerWidth, ph = window.innerHeight;
    isPortrait = pw < ph;
    bgColor = Math.min(pw, ph) < 600 ? "#7ab8e8" : "#ffffff";

    if (isPortrait) {
        GW = ph; GH = pw;
        canvas.width = GW; canvas.height = GH;
        wrap.style.width  = GW + "px";
        wrap.style.height = GH + "px";
        wrap.style.transformOrigin = "0 0";
        wrap.style.transform = "rotate(90deg) translateY(-" + pw + "px)";
    } else {
        GW = pw; GH = ph;
        canvas.width = GW; canvas.height = GH;
        wrap.style.width  = GW + "px";
        wrap.style.height = GH + "px";
        wrap.style.transformOrigin = "0 0";
        wrap.style.transform = "none";
    }
    updateMenuPosition();
}

// ── Init & resize ──────────────────────────────────────────────────
function init() {
    setupLayout();
    renderGrid();
}

window.addEventListener("resize", () => { setupLayout(); renderGrid(); });
window.addEventListener("orientationchange", () => {
    setTimeout(() => { setupLayout(); renderGrid(); }, 350);
});

init();
</script>
</body>
</html>
